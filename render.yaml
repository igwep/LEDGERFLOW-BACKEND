services:
  # Type of service
  type: web
  
  # Use Node runtime (simpler than Docker)
  runtime: node
  
  # Node version
  nodeVersion: 18
  
  # Build command
  buildCommand: npm install && npm run build
  
  # Start command
  startCommand: npm start
  
  # Health check path
  healthCheckPath: /api/health
  
  # Auto-deploy configuration
  autoDeploy: true
  
  # Plan type (free, starter, standard, pro)
  plan: starter
